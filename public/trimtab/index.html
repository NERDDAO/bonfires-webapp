<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TRIMTAB — Bonfires Agent Mind</title>
<meta name="description" content="Live view into a Bonfires AI agent's reasoning state during hackathon judging">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300;1,9..40,400&family=JetBrains+Mono:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    /* Bonfires Design System */
    --bg: #0d1f26;
    --bg2: #111c23;
    --surface: #152530;
    --surface2: #1a2f3a;
    --ember: #f5572a;
    --ember-dim: rgba(245, 87, 42, 0.15);
    --ember-glow: rgba(245, 87, 42, 0.07);
    --text: #f3ffff;
    --text-secondary: #8da8af;
    --text-dim: #3d5a64;
    --border: rgba(255, 255, 255, 0.07);
    --border-bright: rgba(255, 255, 255, 0.14);
    --radius: 8px;
    --radius-pill: 100px;

    /* Trimtab-specific extensions */
    --feed-bg: #0a1a20;
    --ghost: #0f2028;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 17px;
    line-height: 1.65;
    height: 100vh;
    overflow: hidden;
  }

  /* Bonfires Film Grain (required) */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.035'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
    opacity: 0.4;
  }

  /* CRT scanlines */
  body::after {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      transparent,
      transparent 2px,
      rgba(0,0,0,0.04) 2px,
      rgba(0,0,0,0.04) 4px
    );
    pointer-events: none;
    z-index: 9998;
  }

  .vignette {
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at center, transparent 45%, rgba(10,20,26,0.7) 100%);
    pointer-events: none;
    z-index: 9997;
  }

  .h-band {
    position: fixed; left: 0; right: 0; height: 1px;
    background: rgba(245, 87, 42, 0.04);
    z-index: 9996; pointer-events: none;
    animation: bandScroll 12s linear infinite;
  }

  h1, h2, h3, h4 {
    font-family: 'Montserrat', sans-serif;
    line-height: 1.1;
    letter-spacing: -0.02em;
  }

  /* === LAYOUT === */
  .shell {
    display: grid;
    grid-template-columns: 1fr 360px;
    grid-template-rows: 36px 1fr 28px;
    height: 100vh;
    gap: 2px;
    background: var(--bg);
    animation: pageGlitch 20s infinite;
  }

  /* === TOP BAR === */
  .top-bar {
    grid-column: 1 / -1;
    background: var(--bg2);
    display: flex;
    align-items: center;
    padding: 0 24px;
    gap: 16px;
    border-bottom: 1px solid var(--border);
  }

  .brand {
    font-family: 'Montserrat', sans-serif;
    font-size: 12px;
    font-weight: 800;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ember);
  }

  .sep { color: var(--text-dim); font-size: 12px; }

  .top-bar .agent-name {
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
  }

  .top-bar .meta {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: var(--text-secondary);
  }

  .phase-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--ember-dim);
    border: 1px solid rgba(245,87,42,0.3);
    color: var(--ember);
    font-family: 'Montserrat', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 3px 12px;
    border-radius: var(--radius-pill);
  }

  .live-indicator {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .live-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--ember);
    animation: pulse 2s infinite;
  }

  .live-text {
    font-family: 'Montserrat', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  /* === FEED === */
  .feed-zone {
    background: var(--feed-bg);
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 0 32px 24px;
  }

  .feed-zone::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; height: 120px;
    background: linear-gradient(var(--feed-bg), transparent);
    z-index: 2; pointer-events: none;
  }

  .feed-zone::after {
    content: '';
    position: absolute;
    width: 600px; height: 400px;
    background: radial-gradient(ellipse, rgba(245,87,42,0.03) 0%, transparent 70%);
    bottom: 20%; left: 30%;
    pointer-events: none;
    z-index: 0;
  }

  #feed-container {
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    min-height: 0;
    position: relative;
    z-index: 1;
  }

  .feed-line {
    line-height: 2.4;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    position: relative;
    z-index: 1;
    opacity: 0;
    animation: typeIn 0.4s forwards;
  }

  /* Position-based fading: older lines at top are dimmer */
  .feed-line.fade-1 { opacity: 0.12; }
  .feed-line.fade-2 { opacity: 0.18; }
  .feed-line.fade-3 { opacity: 0.25; }
  .feed-line.fade-4 { opacity: 0.35; }
  .feed-line.fade-5 { opacity: 0.45; }
  .feed-line.fade-6 { opacity: 0.55; }
  .feed-line.fade-7 { opacity: 0.65; }
  .feed-line.fade-8 { opacity: 0.75; }
  .feed-line.fade-9 { opacity: 0.85; }

  .ts {
    font-size: 10px;
    color: var(--text-dim);
    margin-right: 10px;
    font-variant-numeric: tabular-nums;
  }

  .thought {
    font-size: 13px;
    color: var(--text-secondary);
    font-style: italic;
    font-weight: 300;
  }

  .thought .emphasis { font-style: normal; color: var(--text); font-weight: 400; }
  .thought .uncertainty { color: var(--text-dim); }
  .thought .conviction { color: var(--ember); font-style: normal; font-weight: 500; }
  .thought .num { color: var(--text-secondary); font-style: normal; font-weight: 400; }
  .thought .aside { color: var(--text-dim); font-size: 11px; }
  .thought .project-name { color: var(--text); font-style: normal; font-weight: 500; }
  .thought .score-high { color: var(--ember); font-style: normal; }
  .thought .score-mid { color: var(--text-secondary); font-style: normal; }
  .thought .score-low { color: var(--text-dim); font-style: normal; }

  .feed-line.signal-burst {
    background: linear-gradient(90deg, transparent, rgba(245,87,42,0.03) 20%, rgba(245,87,42,0.03) 80%, transparent);
  }
  .feed-line.signal-burst .thought { color: var(--text); font-style: normal; }

  .feed-line.note-write {
    padding-left: 20px;
    border-left: 2px solid var(--ember-dim);
    margin-left: 78px;
  }
  .feed-line.note-write .thought { font-size: 11px; color: var(--text-dim); font-style: normal; }

  .feed-line.phase-shift {
    margin-top: 12px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
  }
  .feed-line.phase-shift .thought { color: var(--ember); font-style: normal; font-weight: 500; letter-spacing: 0.03em; }

  .cursor-line { margin-top: 8px; height: 20px; z-index: 1; position: relative; }
  .cursor-block {
    display: inline-block;
    width: 9px; height: 15px;
    background: var(--ember);
    animation: cursorBlink 1.2s step-end infinite;
    margin-left: 78px;
  }

  /* === RIGHT SIDEBAR === */
  .sidebar {
    display: flex;
    flex-direction: column;
    gap: 2px;
    background: var(--bg);
    overflow-y: auto;
  }

  .panel {
    background: var(--surface);
    padding: 20px 24px;
  }

  .panel-header {
    font-family: 'Montserrat', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ember);
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .panel-header .count {
    color: var(--text-dim);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 0;
    text-transform: none;
  }

  /* --- Mind Panel --- */
  .mind-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }

  .mind-metric { display: flex; flex-direction: column; gap: 4px; }

  .mind-label {
    font-family: 'Montserrat', sans-serif;
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-dim);
  }

  .mind-value {
    font-family: 'Montserrat', sans-serif;
    font-size: 24px;
    font-weight: 800;
    color: var(--text-secondary);
    line-height: 1;
  }

  .mind-value.primary { color: var(--text); font-size: 32px; }
  .mind-value.phase-val { font-size: 13px; font-weight: 700; letter-spacing: 0.08em; color: var(--ember); }
  .mind-value.current-name { font-size: 15px; font-weight: 700; color: var(--text); }

  .mind-sub {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    color: var(--text-dim);
    font-weight: 300;
  }

  .mind-metric.full { grid-column: 1 / -1; }

  .mind-value .frac {
    font-size: 16px;
    color: var(--text-dim);
    font-weight: 700;
  }

  /* --- Leaderboard --- */
  .score-list { display: flex; flex-direction: column; gap: 6px; }

  .score-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 4px 0;
  }

  .score-rank {
    font-family: 'JetBrains Mono', monospace;
    width: 20px;
    text-align: right;
    color: var(--text-dim);
    font-size: 11px;
  }

  .score-name {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 400;
    flex: 1;
    color: var(--text-secondary);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .score-bar-mini {
    width: 80px;
    height: 2px;
    background: var(--border);
    border-radius: 1px;
    position: relative;
    overflow: hidden;
  }

  .score-bar-fill {
    position: absolute;
    left: 0; top: 0;
    height: 100%;
    background: var(--text-dim);
    border-radius: 1px;
  }

  .score-bar-fill.top { background: var(--ember); }

  .score-num {
    font-family: 'Montserrat', sans-serif;
    width: 26px;
    text-align: right;
    font-variant-numeric: tabular-nums;
    color: var(--text-dim);
    font-size: 13px;
    font-weight: 700;
  }

  .score-num.top { color: var(--text); }

  .score-row.reviewing {
    background: var(--surface2);
    padding: 4px 8px;
    margin: 0 -8px;
    border-radius: var(--radius);
  }

  .score-row.reviewing .score-name { color: var(--text); font-weight: 500; }

  /* --- Notes --- */
  .notes-list { display: flex; flex-direction: column; gap: 8px; }

  .note-entry {
    display: flex;
    flex-direction: column;
    gap: 3px;
    padding: 6px 0;
  }

  .note-type-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .note-type {
    font-family: 'Montserrat', sans-serif;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .note-type.status { color: var(--ember); }
  .note-type.track { color: var(--text-secondary); }
  .note-type.light { color: var(--text-dim); }

  .note-time {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    margin-left: auto;
  }

  .note-content {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.5;
    font-weight: 300;
  }

  .note-content .n-name { color: var(--text); font-weight: 400; }
  .note-content .n-score { font-weight: 500; }
  .note-content .n-score.high { color: var(--ember); }
  .note-content .n-score.mid { color: var(--text-secondary); }

  .note-entry.active {
    background: var(--surface2);
    padding: 8px 10px;
    margin: 0 -10px;
    border-radius: var(--radius);
    border-left: 2px solid var(--ember);
  }

  .note-entry.active .note-content { color: var(--text); }

  /* === STATUS BAR === */
  .status-bar {
    grid-column: 1 / -1;
    background: var(--bg2);
    display: flex;
    align-items: center;
    padding: 0 24px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.05em;
    gap: 24px;
    border-top: 1px solid var(--border);
  }

  .status-bar .s-val { color: var(--text-secondary); }

  .progress-mini { display: flex; align-items: center; gap: 8px; }

  .progress-track-mini {
    width: 100px; height: 2px;
    background: var(--border);
    border-radius: 1px;
    position: relative;
    overflow: hidden;
  }

  .progress-fill-mini {
    position: absolute;
    left: 0; top: 0;
    height: 100%;
    background: var(--ember);
    border-radius: 1px;
  }

  /* === ANIMATIONS === */
  @keyframes typeIn {
    from { opacity: 0; transform: translateY(2px); }
    to { opacity: 1; transform: none; }
  }

  @keyframes cursorBlink { 50% { opacity: 0; } }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  @keyframes pageGlitch {
    0%, 94%, 100% { transform: none; }
    95% { transform: translateX(-1px) skewX(-0.15deg); }
    96% { transform: translateX(1px); }
    97% { transform: none; }
  }

  @keyframes bandScroll {
    0% { top: -1px; }
    100% { top: 100vh; }
  }

  @keyframes lineFlicker {
    0%, 98%, 100% { opacity: 1; }
    98.5% { opacity: 0.3; }
    99.5% { opacity: 0.5; }
  }

  /* === REDUCED MOTION === */
  @media (prefers-reduced-motion: reduce) {
    .shell { animation: none; }
    .h-band { animation: none; display: none; }
    .feed-line { animation: none; opacity: 1; }
    .feed-line.fade-1, .feed-line.fade-2, .feed-line.fade-3 { opacity: 0.3; }
    .feed-line.fade-4, .feed-line.fade-5, .feed-line.fade-6 { opacity: 0.5; }
    .feed-line.fade-7, .feed-line.fade-8, .feed-line.fade-9 { opacity: 0.7; }
  }
</style>
</head>
<body>

<div class="vignette"></div>
<div class="h-band"></div>

<div class="shell">

  <!-- TOP BAR -->
  <div class="top-bar">
    <span class="brand">Trimtab</span>
    <span class="sep">│</span>
    <span class="agent-name" id="top-agent-name">loading...</span>
    <span class="sep">│</span>
    <span class="meta" id="top-meta"></span>
    <span class="phase-badge" id="top-phase" style="display:none"></span>
    <div class="live-indicator">
      <div class="live-dot"></div>
      <span class="live-text">Transmitting</span>
    </div>
  </div>

  <!-- FEED -->
  <div class="feed-zone">
    <div id="feed-container"></div>
    <div class="cursor-line">
      <span class="cursor-block"></span>
    </div>
  </div>

  <!-- RIGHT SIDEBAR -->
  <div class="sidebar">

    <!-- Mind -->
    <div class="panel">
      <div class="panel-header"><span>Mind</span></div>
      <div class="mind-grid" id="mind-panel">
        <div class="mind-metric">
          <span class="mind-label">Agent</span>
          <span class="mind-value current-name" id="mind-agent">loading...</span>
        </div>
        <div class="mind-metric">
          <span class="mind-label">Notes</span>
          <span class="mind-value primary" id="mind-notes">—</span>
        </div>
        <div class="mind-metric">
          <span class="mind-label">Quests</span>
          <span class="mind-value" style="color:var(--text)" id="mind-quests">0</span>
        </div>
        <div class="mind-metric">
          <span class="mind-label">Tasks</span>
          <span class="mind-value" style="color:var(--text)" id="mind-tasks">0</span>
        </div>
        <div class="mind-metric full">
          <span class="mind-label">Last Updated</span>
          <span class="mind-sub" id="mind-updated">—</span>
        </div>
      </div>
    </div>

    <!-- Leaderboard (populated from LIGHT notes) -->
    <div class="panel" id="leaderboard-panel" style="display:none">
      <div class="panel-header">
        <span>Leaderboard</span>
        <span class="count" id="leaderboard-count"></span>
      </div>
      <div class="score-list" id="leaderboard"></div>
    </div>

    <!-- Trimtab Notes (last N) -->
    <div class="panel">
      <div class="panel-header">
        <span>Notes</span>
        <span class="count" id="notes-count">0</span>
      </div>
      <div class="notes-list" id="notes-panel"></div>
    </div>

  </div>

  <!-- STATUS BAR -->
  <div class="status-bar">
    <span id="status-agent">AGENT —</span>
    <span class="sep">│</span>
    <span id="status-updated">—</span>
    <span style="margin-left:auto">NOTES <span class="s-val" id="status-notes">0</span></span>
    <span>QUESTS <span class="s-val" id="status-quests">0</span></span>
    <span>TASKS <span class="s-val" id="status-tasks">0</span></span>
  </div>

</div>

<script>
// === CONFIG ===
const POLL_INTERVAL = 5000;
const MAX_FEED_LINES = 20;
const API_BASE = (new URLSearchParams(window.location.search).get('api') || 'http://localhost:8000').replace(/\/+$/, '');
const MAX_SIDEBAR_NOTES = 8;
const container = document.getElementById('feed-container');

// Get agent ID from URL: /trimtab/?agent=69a6708109adb37d0628b8e2
const params = new URLSearchParams(window.location.search);
const agentId = params.get('agent');

if (!agentId) {
  container.innerHTML = '<div class="feed-line" style="opacity:1"><span class="thought"><span class="conviction">no agent specified.</span> add ?agent=AGENT_ID to the URL</span></div>';
}

// === STATE ===
let seenNoteIds = new Set();
let lastData = null;

// === FEED ===
function updateFadeClasses() {
  const lines = container.querySelectorAll('.feed-line');
  const count = lines.length;
  lines.forEach((line, i) => {
    for (let f = 1; f <= 9; f++) line.classList.remove('fade-' + f);
    const fromBottom = count - 1 - i;
    if (fromBottom >= 9) line.classList.add('fade-1');
    else if (fromBottom >= 1) line.classList.add('fade-' + (10 - fromBottom));
  });
}

function classifyNote(content) {
  if (content.startsWith('STATUS')) return 'signal-burst';
  if (content.startsWith('TRACK REVIEW')) return 'phase-shift';
  if (content.startsWith('LIGHT')) return '';
  if (content.includes('PURGE') || content.includes('RESTORATION')) return 'signal-burst';
  return '';
}

function formatNoteContent(content) {
  // Escape HTML
  const safe = content.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

  // Highlight patterns
  return safe
    // Scores: 87/100
    .replace(/(\d+)\/100/g, (_, score) => {
      const n = parseInt(score);
      const cls = n >= 80 ? 'score-high' : n >= 60 ? 'score-mid' : 'score-low';
      return `<span class="${cls}">${score}</span>/100`;
    })
    // Phase values
    .replace(/phase:(\w+)/g, 'phase:<span class="emphasis">$1</span>')
    // Pipe-delimited keys
    .replace(/(\w+):(\d+)/g, '$1:<span class="num">$2</span>')
    // Project names after LIGHT |
    .replace(/^LIGHT \| (.+?) \|/, 'LIGHT | <span class="project-name">$1</span> |')
    // STATUS prefix
    .replace(/^STATUS/, '<span class="conviction">STATUS</span>')
    // TRACK REVIEW prefix
    .replace(/^TRACK REVIEW/, '<span class="conviction">TRACK REVIEW</span>');
}

function formatTime(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  return d.toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

function addNoteFeedLine(note) {
  const el = document.createElement('div');
  const type = classifyNote(note.content);
  el.className = 'feed-line' + (type ? ' ' + type : '');

  const ts = formatTime(note.createdAt || note.createdAt?.$date);
  let inner = '';
  if (ts) inner += `<span class="ts">${ts}</span>`;
  inner += `<span class="thought">${formatNoteContent(note.content)}</span>`;
  el.innerHTML = inner;

  container.appendChild(el);

  while (container.children.length > MAX_FEED_LINES) {
    container.removeChild(container.firstChild);
  }

  updateFadeClasses();
}

// === SIDEBAR: LEADERBOARD ===
function parseLeaderboard(notes) {
  const projects = [];
  for (const note of notes) {
    const match = note.content.match(/^LIGHT \| (.+?) \| (\d+)\/100/);
    if (match) {
      projects.push({ name: match[1], score: parseInt(match[2]) });
    }
  }
  projects.sort((a, b) => b.score - a.score);
  return projects;
}

function renderLeaderboard(projects) {
  const panel = document.getElementById('leaderboard-panel');
  const el = document.getElementById('leaderboard');
  const countEl = document.getElementById('leaderboard-count');

  if (projects.length === 0) {
    panel.style.display = 'none';
    return;
  }

  panel.style.display = '';
  countEl.textContent = projects.length + ' projects';

  el.innerHTML = projects.map((p, i) => {
    const isTop = i < 3;
    return `<div class="score-row${i === 0 ? ' reviewing' : ''}">
      <span class="score-rank">${i + 1}</span>
      <span class="score-name">${p.name}</span>
      <div class="score-bar-mini"><div class="score-bar-fill${isTop ? ' top' : ''}" style="width:${p.score}%"></div></div>
      <span class="score-num${isTop ? ' top' : ''}">${p.score}</span>
    </div>`;
  }).join('');
}

// === SIDEBAR: NOTES ===
function getNoteType(content) {
  if (content.startsWith('STATUS')) return 'status';
  if (content.startsWith('TRACK REVIEW')) return 'track';
  if (content.startsWith('LIGHT')) return 'light';
  return 'note';
}

function renderNotesPanel(notes) {
  const el = document.getElementById('notes-panel');
  const countEl = document.getElementById('notes-count');
  countEl.textContent = notes.length;

  // Show last N notes, newest first
  const recent = notes.slice(-MAX_SIDEBAR_NOTES).reverse();

  el.innerHTML = recent.map((note, i) => {
    const type = getNoteType(note.content);
    const ts = formatTime(note.createdAt || note.createdAt?.$date);
    const isActive = i === 0;
    const safe = note.content.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

    return `<div class="note-entry${isActive ? ' active' : ''}">
      <div class="note-type-row">
        <span class="note-type ${type}">${type}</span>
        <span class="note-time">${ts}</span>
      </div>
      <span class="note-content">${safe.substring(0, 120)}${safe.length > 120 ? '...' : ''}</span>
    </div>`;
  }).join('');
}

// === SIDEBAR: MIND ===
function renderMind(data) {
  document.getElementById('mind-agent').textContent = data.agentName;
  document.getElementById('mind-notes').textContent = data.notes.length;
  document.getElementById('mind-quests').textContent = data.quests.length;
  document.getElementById('mind-tasks').textContent = data.tasks.length;

  const updated = data.updatedAt?.$date || data.updatedAt;
  if (updated) {
    document.getElementById('mind-updated').textContent = new Date(updated).toLocaleString();
  }
}

// === TOP BAR ===
function renderTopBar(data) {
  document.getElementById('top-agent-name').textContent = data.agentName;

  // Extract phase from STATUS note if present
  const statusNote = data.notes.find(n => n.content.startsWith('STATUS'));
  if (statusNote) {
    const phaseMatch = statusNote.content.match(/phase:(\w+)/);
    if (phaseMatch) {
      const badge = document.getElementById('top-phase');
      badge.textContent = phaseMatch[1].replace(/_/g, ' ');
      badge.style.display = '';
    }

    // Extract track info from metadata
    const currentMatch = statusNote.content.match(/current:([^|]+)/);
    if (currentMatch) {
      document.getElementById('top-meta').textContent = currentMatch[1].trim();
    }
  }
}

// === STATUS BAR ===
function renderStatusBar(data) {
  const shortId = data.agentId.substring(0, 6) + '..' + data.agentId.substring(data.agentId.length - 4);
  document.getElementById('status-agent').textContent = 'AGENT ' + shortId;

  const updated = data.updatedAt?.$date || data.updatedAt;
  if (updated) {
    document.getElementById('status-updated').textContent = 'UPDATED ' + formatTime(updated);
  }

  document.getElementById('status-notes').textContent = data.notes.length;
  document.getElementById('status-quests').textContent = data.quests.length;
  document.getElementById('status-tasks').textContent = data.tasks.length;
}

// === POLLING ===
async function fetchTrimtab() {
  if (!agentId) return;

  try {
    const res = await fetch(API_BASE + '/trimtabs/' + agentId);
    if (!res.ok) {
      if (!lastData) {
        container.innerHTML = '<div class="feed-line" style="opacity:1"><span class="thought"><span class="uncertainty">failed to load trimtab: ' + res.status + '</span></span></div>';
      }
      return;
    }

    const data = await res.json();
    lastData = data;

    // Render sidebar
    renderMind(data);
    renderTopBar(data);
    renderStatusBar(data);
    renderNotesPanel(data.notes);
    renderLeaderboard(parseLeaderboard(data.notes));

    // Feed: inject new notes we haven't seen
    const newNotes = [];
    for (const note of data.notes) {
      const noteId = note.id || note.noteId;
      if (noteId && !seenNoteIds.has(noteId)) {
        seenNoteIds.add(noteId);
        newNotes.push(note);
      }
    }

    // On first load, show the last N notes as initial burst
    if (seenNoteIds.size === data.notes.length && container.children.length === 0) {
      const initial = data.notes.slice(-MAX_FEED_LINES);
      let delay = 0;
      for (const note of initial) {
        setTimeout(() => addNoteFeedLine(note), delay);
        delay += 150;
      }
    } else {
      // Subsequent polls: inject only new notes with stagger
      let delay = 0;
      for (const note of newNotes) {
        setTimeout(() => addNoteFeedLine(note), delay);
        delay += 300;
      }
    }

  } catch (err) {
    console.error('Trimtab fetch error:', err);
  }
}

// Start polling
if (agentId) {
  fetchTrimtab();
  setInterval(fetchTrimtab, POLL_INTERVAL);
}

// Flicker on every 5th line
const flickerObserver = new MutationObserver(() => {
  const lines = container.querySelectorAll('.feed-line');
  lines.forEach((line, i) => {
    if ((i + 1) % 5 === 0 && !line.dataset.flickerApplied) {
      line.style.animation = 'typeIn 0.4s forwards, lineFlicker 17s 3s infinite';
      line.dataset.flickerApplied = 'true';
    }
  });
});
flickerObserver.observe(container, { childList: true });
</script>
